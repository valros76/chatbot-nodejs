<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    Mon premier chatbot
  </title>
  <style>
    body{
      font-family:system-ui, sans-serif;
    }

    .chat-container{
      width:400px;
      margin-block:20pt;
      margin-inline:auto;
      border: 1pt solid #ccc;
      padding:10pt;
    }

    .messages{
      height:300px;
      overflow-y:scroll;
      border:1pt solid #eee;
      padding:10pt;
    }

    .input-box{
      width:calc(100% - 10pt);
      padding:5pt;
      margin-top:10pt;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <h1>
      Bienvenue sur mon chatbot !
    </h1>

    <div class="messages" id="messages"></div>

    <input type="text" id="inputMessage" class="input-box" placeholder="Tapez votre message ici..."/>

    <select id="chatOptions">
      <option selected disabled>Vous avez une question ?</option>
      <option value="horaires">
        Quels sont vos horaires ?
      </option>
      <option value="retours">
        Quelles sont vos conditions de retour ?
      </option>
      <option value="contact">
        Comment vous contacter ?
      </option>
    </select>
  </div>

  <script>
    const messagesDiv = document.querySelector("#messages");
    const inputMessage = document.querySelector("#inputMessage");
    const chatOptions = document.querySelector("#chatOptions");

    // Fonction qui aura pour rôle d'afficher un message
    function appendMessage(sender, message){
      const messageElement = document.createElement("div");
      messageElement.textContent = `${sender.toUpperCase()} : ${message}`;
      messagesDiv.appendChild(messageElement);
      messagesDiv.scrollTop = messagesDiv.height;
    };

    // Gérer l'envoi d'un message par l'utilisateur
    inputMessage.addEventListener("keypress", async (e) => {
      if(e.key === "Enter" && inputMessage.value.trim() !== ""){
        const userMessage = inputMessage.value.trim();
        appendMessage("Moi", userMessage);
        inputMessage.value = "";

        // Envoi du message au serveur via l'API
        try{

          const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: userMessage })
          });
          const data = await response.json();
          appendMessage("Chatbot", data.text);

        }catch(err){
          console.error("Une erreur s'est produite lors de l'envoi du message", err);
          appendMessage("Chatbot", "Oups, une erreur s'est produite !");
        }
      }
    });

    chatOptions.addEventListener("input", async (e) => {
      const selectedValue = e.currentTarget.selectedOptions[0].value;
      const selectedLabel = e.currentTarget.selectedOptions[0].label;
      try{
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: selectedValue})
        });
        const data = await response.json();
        appendMessage("Moi", selectedLabel);
        appendMessage("Chatbot", data.text);

      }catch(err){
        appendMessage("Chatbot", "Une erreur s'est produite !");
      }
    });

  </script>
</body>
</html>
